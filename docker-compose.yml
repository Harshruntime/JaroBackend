version: "3.8"

services:
    # MongoDB Service with custom image
    mongodb:
        build: .
        container_name: mongodb
        hostname: mongodb
        ports:
            - "27017:27017"
        environment:
            - MONGO_INITDB_ROOT_USERNAME=admin
            - MONGO_INITDB_ROOT_PASSWORD=password
        volumes:
            - mongodb_data:/data/db
        restart: always
        healthcheck:
            test: mongosh --eval "db.adminCommand('ping')"
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    # Service to initialize the replica set
    mongo-setup:
        image: mongo:6.0
        depends_on:
            mongodb:
                condition: service_healthy
        restart: "no"
        entrypoint: >
            bash -c "
              echo 'Waiting for MongoDB to be ready...' &&
              sleep 5 &&
              mongosh --host mongodb:27017 -u admin -p password --authenticationDatabase admin --eval '
                rs.initiate({
                  _id: \"rs0\",
                  members: [{ _id: 0, host: \"localhost:27017\" }]
                })
              ' &&
              echo 'Replica set initialized successfully'"

    redis:
        image: redis:6
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 2s
            timeout: 3s
            retries: 5

volumes:
    mongodb_data:
        driver: local
    redis_data:
